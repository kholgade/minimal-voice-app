<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Agent</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ── Top bar ─────────────────────────────────────────── -->
  <header id="topbar">
    <div class="brand">
      <div class="brand-icon">V</div>
      <span class="brand-name">Voice Agent</span>
    </div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="global-search" class="search-input" placeholder="Search…" autocomplete="off">
    </div>
    <div class="topbar-right">
      <div id="conn-dot" class="conn-dot" title="Connecting…"></div>
      <a href="recording.html" class="icon-btn" title="New Recording">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </a>
      <a href="config.html" class="icon-btn" title="Config">⚙</a>
      <button id="new-conv-btn" class="icon-btn" title="New conversation">＋</button>
    </div>
  </header>

  <!-- ── Body layout ────────────────────────────────────── -->
  <div id="layout">

    <!-- Icon rail -->
    <nav id="rail">
      <button class="rail-btn active" title="Canvas">◉</button>
      <button class="rail-btn" title="Library">▤</button>
      <button class="rail-btn" title="Settings" onclick="location.href='config.html'">⚙</button>
      <div class="rail-gap"></div>
      <button class="rail-btn" id="rail-new-btn" title="New conversation">＋</button>
    </nav>

    <!-- Left sidebar -->
    <aside id="sidebar">
      <div class="panel-hd">
        <span>History &amp; Assets</span>
        <button class="chevron-btn" onclick="toggleSidebar()">⌃</button>
      </div>
      <div class="section-lbl">Recent Sessions</div>
      <div id="session-list"></div>
    </aside>

    <!-- Centre canvas -->
    <main id="canvas">
      <div class="canvas-hd">
        <span class="canvas-title">The Canvas</span>
        <div class="canvas-hd-right">
          <button class="live-cards-btn">
            Live cards
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
          </button>
          <div class="status-pill">
            <span id="status-dot" class="status-dot"></span>
            <span id="status-text">Connecting…</span>
          </div>
        </div>
      </div>

      <div id="messages"></div>

      <div id="input-zone">
        <div id="ghost-row" class="hidden">
          <span class="ghost-label">Ghost Text</span>
          <span id="ghost-text" class="ghost-text"></span>
        </div>
        <div id="input-row">
          <div id="input-bar">
            <input id="text-field" class="text-input" type="text" placeholder="Ask anything…"
                   onkeydown="if(event.key==='Enter')sendText()">
            <button id="send-btn" class="send-btn" onclick="sendText()">Send</button>
          </div>
          <button id="mic-btn" onclick="toggleRecording()" title="Record">
            <span class="mic-ripple"></span>
            <span class="mic-ripple"></span>
            <div id="waveform" class="hidden">
              <span class="wbar"></span>
              <span class="wbar"></span>
              <span class="wbar"></span>
              <span class="wbar"></span>
              <span class="wbar"></span>
            </div>
            <svg id="mic-svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm6.5 9a.5.5 0 0 1 .5.5A7 7 0 0 1 12.5 17v2.5H15a.5.5 0 0 1 0 1H9a.5.5 0 0 1 0-1h2.5V17A7 7 0 0 1 5 10.5a.5.5 0 0 1 1 0 6 6 0 0 0 12 0 .5.5 0 0 1 .5-.5z"/>
            </svg>
          </button>
        </div>
      </div>
    </main>

    <!-- Right inspector -->
    <aside id="inspector">
      <div class="panel-hd">
        <span>Intelligence Inspector</span>
        <button class="close-btn" onclick="toggleInspector()" title="Close">✕</button>
      </div>
      <p class="inspector-desc">Updates dynamically with real-time extracted data.</p>

      <div class="insp-section">
        <div class="insp-section-hd">
          <span>Key Summaries</span>
          <button class="chevron-btn">⌃</button>
        </div>
        <div class="insp-section-body">
          <p class="summary-title">Executive Summary:</p>
          <ul id="summary-list">
            <li class="empty-state">Start a conversation to see summaries.</li>
          </ul>
        </div>
      </div>

      <div class="insp-section">
        <div class="insp-section-hd">
          <span>Action Items</span>
          <button class="chevron-btn">⌃</button>
        </div>
        <p class="insp-sub">Interactive extracted data</p>
        <div id="action-items">
          <label class="action-item empty-state">
            <input type="checkbox" disabled> Nothing extracted yet
          </label>
        </div>
      </div>
    </aside>

  </div>

  <!-- Mobile bottom tab bar -->
  <nav id="mobile-tabs">
    <button class="tab-btn active" onclick="showTab('canvas')">Canvas</button>
    <button class="tab-btn" onclick="showTab('sidebar')">History</button>
    <button class="tab-btn" onclick="showTab('inspector')">Inspector</button>
  </nav>

</div>
<script src="app.js"></script>
</body>
</html>
