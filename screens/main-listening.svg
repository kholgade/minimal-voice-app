<svg xmlns="http://www.w3.org/2000/svg" width="780" height="620" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Pulse ring animation -->
    <style>
      .pulse-ring {
        animation: pulse 1.5s ease-out infinite;
        transform-origin: 746px 576px;
      }
      @keyframes pulse {
        0%   { opacity: 0.6; r: 22px; }
        100% { opacity: 0;   r: 38px; }
      }
    </style>
  </defs>

  <!-- App background -->
  <rect width="780" height="620" fill="#0f0f13"/>

  <!-- Header -->
  <rect width="780" height="57" fill="#0f0f13"/>
  <line x1="0" y1="57" x2="780" y2="57" stroke="#23232f" stroke-width="1"/>
  <text x="24" y="35" fill="#e0e0e8" font-size="16" font-weight="600" letter-spacing="0.3">Voice Agent</text>
  <rect x="530" y="16" width="140" height="28" rx="7" fill="none" stroke="#32323e" stroke-width="1"/>
  <text x="600" y="34" fill="#999" font-size="12" text-anchor="middle">New Conversation</text>
  <rect x="682" y="16" width="72" height="28" rx="7" fill="none" stroke="#32323e" stroke-width="1"/>
  <text x="718" y="34" fill="#999" font-size="12" text-anchor="middle">Config</text>

  <!-- Messages area -->
  <rect x="0" y="57" width="780" height="467" fill="#0f0f13"/>

  <!-- Message 1: user -->
  <rect x="432" y="84" width="308" height="52" rx="12" fill="#5b4cdb"/>
  <rect x="728" y="117" width="12" height="16" rx="2" fill="#5b4cdb"/>
  <text x="448" y="106" fill="#fff" font-size="13">Hey, who wrote Moby Dick?</text>

  <!-- Message 2: assistant -->
  <rect x="40" y="158" width="380" height="68" rx="12" fill="#1c1c28"/>
  <rect x="40" y="174" width="12" height="16" rx="2" fill="#1c1c28"/>
  <text x="56" y="182" fill="#ddd" font-size="13">Herman Melville wrote Moby Dick,</text>
  <text x="56" y="200" fill="#ddd" font-size="13">published in 1851.</text>

  <!-- Message 3: user -->
  <rect x="432" y="250" width="308" height="52" rx="12" fill="#5b4cdb"/>
  <rect x="728" y="283" width="12" height="16" rx="2" fill="#5b4cdb"/>
  <text x="448" y="272" fill="#fff" font-size="13">What else did he write?</text>

  <!-- Message 4: assistant -->
  <rect x="40" y="324" width="440" height="84" rx="12" fill="#1c1c28"/>
  <rect x="40" y="340" width="12" height="16" rx="2" fill="#1c1c28"/>
  <text x="56" y="350" fill="#ddd" font-size="13">He also wrote Bartleby the Scrivener,</text>
  <text x="56" y="370" fill="#ddd" font-size="13">Billy Budd, and Typee, among others.</text>
  <text x="56" y="390" fill="#ddd" font-size="13">He had a rich literary career.</text>

  <!-- Sound wave indicator (active recording) -->
  <g transform="translate(390, 450)">
    <!-- Waveform bars -->
    <rect x="0"  y="8"  width="5" height="14" rx="3" fill="#5b4cdb" opacity="0.5"/>
    <rect x="9"  y="2"  width="5" height="26" rx="3" fill="#5b4cdb" opacity="0.7"/>
    <rect x="18" y="6"  width="5" height="18" rx="3" fill="#5b4cdb"/>
    <rect x="27" y="0"  width="5" height="30" rx="3" fill="#5b4cdb"/>
    <rect x="36" y="5"  width="5" height="20" rx="3" fill="#5b4cdb"/>
    <rect x="45" y="10" width="5" height="10" rx="3" fill="#5b4cdb" opacity="0.7"/>
    <rect x="54" y="4"  width="5" height="22" rx="3" fill="#5b4cdb" opacity="0.5"/>
  </g>

  <!-- Silence countdown indicator -->
  <rect x="310" y="466" width="160" height="22" rx="11" fill="#1c1c28" stroke="#32323e" stroke-width="1"/>
  <!-- Progress bar fill (showing ~1.5s elapsed of 3s) -->
  <rect x="311" y="467" width="79" height="20" rx="10" fill="#5b4cdb" opacity="0.35"/>
  <text x="390" y="481" fill="#888" font-size="10" text-anchor="middle">silence: 1.5s / 3s</text>

  <!-- Footer -->
  <rect x="0" y="524" width="780" height="96" fill="#0f0f13"/>
  <line x1="0" y1="524" x2="780" y2="524" stroke="#23232f" stroke-width="1"/>

  <!-- Status bar — listening orange -->
  <circle cx="289" cy="542" r="4" fill="#e0953a"/>
  <text x="299" y="547" fill="#e0953a" font-size="11">Listening…</text>

  <!-- Input row — shows partial transcript as user speaks -->
  <rect x="24" y="556" width="696" height="40" rx="8" fill="#1c1c28" stroke="#5b4cdb" stroke-width="1.5"/>
  <text x="40" y="581" fill="#7c7c9a" font-size="13" font-style="italic">Tell me about his other novels…</text>
  <!-- Cursor blink -->
  <rect x="251" y="563" width="2" height="18" rx="1" fill="#7c6ff7" opacity="0.8"/>

  <!-- Mic button — active/recording state -->
  <!-- Outer pulse ring -->
  <circle cx="746" cy="576" r="28" fill="rgba(91,76,219,0.15)" stroke="rgba(91,76,219,0.3)" stroke-width="1"/>
  <!-- Inner mic button filled -->
  <circle cx="746" cy="576" r="19" fill="#5b4cdb" stroke="#5b4cdb" stroke-width="1"/>
  <text x="746" y="582" fill="#fff" font-size="14" text-anchor="middle">🎤</text>
</svg>
