<svg xmlns="http://www.w3.org/2000/svg" width="780" height="620" font-family="system-ui, -apple-system, sans-serif">

  <!-- App background -->
  <rect width="780" height="620" fill="#0f0f13"/>

  <!-- Header -->
  <rect width="780" height="57" fill="#0f0f13"/>
  <line x1="0" y1="57" x2="780" y2="57" stroke="#23232f" stroke-width="1"/>
  <text x="24" y="35" fill="#e0e0e8" font-size="16" font-weight="600" letter-spacing="0.3">Voice Agent</text>
  <rect x="530" y="16" width="140" height="28" rx="7" fill="none" stroke="#32323e" stroke-width="1"/>
  <text x="600" y="34" fill="#999" font-size="12" text-anchor="middle">New Conversation</text>
  <rect x="682" y="16" width="72" height="28" rx="7" fill="none" stroke="#32323e" stroke-width="1"/>
  <text x="718" y="34" fill="#999" font-size="12" text-anchor="middle">Config</text>

  <!-- Messages area -->
  <rect x="0" y="57" width="780" height="467" fill="#0f0f13"/>

  <!-- Message 1: user -->
  <rect x="432" y="84" width="308" height="52" rx="12" fill="#5b4cdb"/>
  <rect x="728" y="100" width="12" height="16" rx="2" fill="#5b4cdb"/>
  <text x="448" y="106" fill="#fff" font-size="13">What else did he write?</text>

  <!-- Message 2: assistant streaming in -->
  <rect x="40" y="158" width="530" height="116" rx="12" fill="#1c1c28"/>
  <rect x="40" y="174" width="12" height="16" rx="2" fill="#1c1c28"/>
  <text x="56" y="182" fill="#ddd" font-size="13">He also wrote Bartleby the Scrivener (1853),</text>
  <text x="56" y="202" fill="#ddd" font-size="13">a story of a Wall Street copyist who refuses</text>
  <text x="56" y="222" fill="#ddd" font-size="13">to work. He also wrote Typee (1846) and</text>
  <text x="56" y="242" fill="#ddd" font-size="13">Omoo (1847), based on his Pacific voyages</text>
  <!-- streaming cursor -->
  <rect x="334" y="248" width="8" height="14" rx="1" fill="#7c6ff7"/>

  <!-- Audio playing indicator -->
  <rect x="40" y="286" width="200" height="28" rx="14" fill="#1a1a2e" stroke="#32323e" stroke-width="1"/>
  <text x="56" y="304" fill="#7c6ff7" font-size="11">▶ Playing audio…</text>
  <!-- mini waveform -->
  <rect x="150" y="294" width="3" height="8"  rx="2" fill="#5b4cdb" opacity="0.6"/>
  <rect x="156" y="290" width="3" height="16" rx="2" fill="#5b4cdb" opacity="0.8"/>
  <rect x="162" y="292" width="3" height="12" rx="2" fill="#5b4cdb"/>
  <rect x="168" y="295" width="3" height="6"  rx="2" fill="#5b4cdb" opacity="0.6"/>
  <rect x="174" y="291" width="3" height="14" rx="2" fill="#5b4cdb" opacity="0.8"/>
  <rect x="180" y="293" width="3" height="10" rx="2" fill="#5b4cdb" opacity="0.5"/>
  <rect x="186" y="295" width="3" height="6"  rx="2" fill="#5b4cdb" opacity="0.4"/>

  <!-- Footer -->
  <rect x="0" y="524" width="780" height="96" fill="#0f0f13"/>
  <line x1="0" y1="524" x2="780" y2="524" stroke="#23232f" stroke-width="1"/>

  <!-- Status bar — responding purple -->
  <circle cx="288" cy="542" r="4" fill="#7c6ff7"/>
  <text x="298" y="547" fill="#7c6ff7" font-size="11">Responding…</text>

  <!-- Input row — disabled while responding -->
  <rect x="24" y="556" width="696" height="40" rx="8" fill="#161620" stroke="#2a2a38" stroke-width="1"/>
  <text x="40" y="581" fill="#3a3a4a" font-size="13">Type a message or tap 🎤…</text>

  <!-- Mic button — dimmed while responding -->
  <circle cx="746" cy="576" r="19" fill="#161620" stroke="#2a2a38" stroke-width="1"/>
  <text x="746" y="582" fill="#3a3a4a" font-size="14" text-anchor="middle">🎤</text>
</svg>
